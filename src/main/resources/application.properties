############ General ###################################################################################################
server.port = ${SERVER_PORT:8080}

############ Database ##################################################################################################
spring.datasource.url = ${DB_URL:jdbc:postgresql://localhost:5432/fitness_app}
spring.datasource.username = ${DB_USERNAME:admin}
spring.datasource.password = ${DB_PASSWORD:admin}
spring.jpa.show-sql = ${JPA_SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto = validate
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

############ Flyway ####################################################################################################
spring.flyway.enabled = true
spring.flyway.baseline-on-migrate = true

############ OpenAPI ###################################################################################################
springdoc.swagger-ui.path = /swagger-ui.html
springdoc.swagger-ui.enabled = true
springdoc.swagger-ui.show-extensions = true
springdoc.swagger-ui.operationsSorter = method
springdoc.swagger-ui.tagsSorter = alpha
springdoc.swagger-ui.oauth.client-id = ${CLIENT_ID:fitness-app}
springdoc.swagger-ui.oauth.scopes = openid,profile,email
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant = true
springdoc.swagger-ui.oauth.use-basic-authentication-with-access-code-grant = false

############ Keycloak ##################################################################################################
spring.security.oauth2.resourceserver.jwt.issuer-uri = ${ISSUER_URI:issuer-uri}
keycloak.authorization.url = ${KEYCLOAK_AUTHORIZATION_URL:keycloak-authorization-url}
keycloak.token.url = ${KEYCLOAK_TOKEN_URL:keycloak-token-url}

############ Open endpoints ############################################################################################
open.endpoints = /swagger-ui.html, /swagger-ui/**, /v3/api-docs/**

############ Cloudinary ################################################################################################
cloudinary.cloud-name = ${CLOUDINARY_CLOUD_NAME:cloud-name}
cloudinary.api-key = ${CLOUDINARY_API_KEY:api-key}
cloudinary.api-secret = ${CLOUDINARY_API_SECRET:api-secret}
media.image.max-size-mb = ${MEDIA_IMAGE_MAX_SIZE_MB:2}