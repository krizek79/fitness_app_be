############ General ###################################################################################################
server.port = 0

############ Database ##################################################################################################
spring.jpa.show-sql = false
spring.datasource.url = jdbc:tc:postgresql:17-alpine:///fitness_app_test
spring.datasource.driver-class-name = org.testcontainers.jdbc.ContainerDatabaseDriver
spring.datasource.username = test
spring.datasource.password = test
spring.jpa.hibernate.ddl-auto = none
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

############ Flyway ####################################################################################################
spring.flyway.enabled = true
spring.flyway.baseline-on-migrate = true

############ OpenAPI ###################################################################################################
springdoc.swagger-ui.path = /swagger-ui.html
springdoc.swagger-ui.enabled = true
springdoc.swagger-ui.oauth.client-id = ${CLIENT_ID:fitness-app}
springdoc.swagger-ui.oauth.scopes = openid,profile,email
springdoc.swagger-ui.oauth.use-pkce-with-authorization-code-grant = true
springdoc.swagger-ui.oauth.use-basic-authentication-with-access-code-grant = false

############ Keycloak ##################################################################################################
spring.security.oauth2.resourceserver.jwt.issuer-uri = ${ISSUER_URI:issuer-uri}
keycloak.authorization.url = ${KEYCLOAK_AUTHORIZATION_URL:keycloak-authorization-url}
keycloak.token.url = ${KEYCLOAK_TOKEN_URL:keycloak-token-url}

############ Actuator ##################################################################################################
management.endpoints.web.exposure.include = health,info,metrics,env
management.endpoint.health.show-details = when-authorized

############ Open endpoints ############################################################################################
open.endpoints = /auth/**, /swagger-ui.html, /swagger-ui/**, /v3/api-docs/**

############ Cloudinary ################################################################################################
cloudinary.cloud-name =
cloudinary.api-key =
cloudinary.api-secret =

############ Media #####################################################################################################
media.image.max-size-mb = ${MEDIA_IMAGE_MAX_SIZE_MB:2}
media.upload.base-path = ${MEDIA_UPLOAD_BASE_PATH:test}
media.upload.sub-path = ${MEDIA_UPLOAD_SUB_PATH:}